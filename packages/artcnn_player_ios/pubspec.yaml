name: artcnn_player_ios
description: iOS native AVPlayer, Core ML ArtCNN, and FlutterTexture bridge.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: ArtCnnPlayerPlugin
